{% set name = "fastmdx" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: REPLACE_WITH_SHA256_AFTER_PYPI_PUBLISH

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=64
  run:
    - python >=3.10
    - fastmdxplora >={{ version }}

test:
  imports:
    - fastmdx
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/aai-research-lab/FastMDXplora
  summary: 'Alias for FastMDXplora; installs the canonical fastmdxplora package.'
  description: |
    fastmdx is the alias PyPI/conda-forge package for FastMDXplora.

    Installing fastmdx installs fastmdxplora underneath. The canonical
    package name is `fastmdxplora`; the recommended import idiom is
    `import fastmdxplora as fastmdx`. The CLI command (`fastmdx`) is
    provided by the canonical package.

    The alias exists to capture both naming variants users may reach for.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - aai-research-lab
