[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --disable-warnings -W ignore::DeprecationWarning
markers =
    slow: time-consuming tests (run with -m slow or exclude with -m 'not slow')
    cli: tests that invoke the command-line interface
    slides: tests that require python-pptx/Pillow and create a deck
filterwarnings =
    # ===== CORE WARNING SUPPRESSION =====
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
    ignore:.*:DeprecationWarning:pyparsing.*
    
    # ===== SKLEARN MDS WARNINGS - ALL VERSIONS =====
    # sklearn 1.10+ warnings
    ignore:Use metric_mds=True instead of metric=True. The support for metric={True/False} will be dropped in 1.10.
    ignore:.*metric_mds.*
    
    # sklearn 1.9 warnings
    ignore:The default value of `n_init` will change from 4 to 1 in 1.9.
    ignore:The default value of `n_init` will change from 4 to 1 in 1.9. To suppress this warning, provide some value of `n_init`.
    
    # sklearn 1.4-1.10 warnings
    ignore:The `dissimilarity` parameter is deprecated and will be removed in 1.10. Use `metric` instead.
    ignore:The default value of `init` will change from 'random' to 'classical_mds' in 1.10.
    ignore:The default value of `init` will change from 'random' to 'classical_mds' in 1.10. To suppress this warning, provide some value of `init`.
    
    # sklearn 1.4+ validation errors (caught as warnings)
    ignore:The 'metric' parameter of MDS must be an instance of 'bool' or an instance of 'numpy.bool'. Got 'euclidean' instead.
    
    # ===== PYPARSING WARNINGS =====
    ignore:.*setParseAction.*
    ignore:.*parseString.*
    ignore:'setParseAction' deprecated.*
    ignore:'parseString' deprecated.*
    
    # ===== TYPE ERROR PATTERNS =====
    ignore:__init__() got an unexpected keyword argument 'init'
    ignore:__init__() got an unexpected keyword argument 'n_init'
    ignore:__init__() got an unexpected keyword argument 'dissimilarity'
    ignore:__init__() got an unexpected keyword argument 'metric'
    ignore:__init__() got an unexpected keyword argument 'metric_mds'
    ignore:__init__() got an unexpected keyword argument 'normalized_stress'
    ignore:MDS.__init__() got an unexpected keyword argument.*
    ignore:.*got an unexpected keyword argument.*
    
    # ===== GENERIC CATCH-ALLS =====
    ignore:.*deprecated.*
    ignore:.*Deprecated.*
    ignore:.*FutureWarning.*
    ignore:.*UserWarning.*
    ignore:.*sklearn.*MDS.*
    ignore:.*sklearn.*manifold.*
    
    # ===== ADDITIONAL WARNING TYPES =====
    ignore::RuntimeWarning
    ignore::ImportWarning
    ignore::BytesWarning
    ignore::ResourceWarning
    ignore::PendingDeprecationWarning